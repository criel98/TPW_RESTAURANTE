<html>
    <head>
        <title>Pedidos</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="CSS/styles.css" rel="stylesheet" type="text/css"/>
    </head>
    <body>

        <main class="PaginaRest">
            <header class="banner">
                <img src="imagenes/Logo/LOGO.png" alt="" class="logo"/>
                <h3>Donde cada plato cuenta una historia</h3>
            </header>
        <nav>
            <a href="index.html#Productos" class="nav-enlace">Productos</a>
            <a href="index.html#Nosotros" class="nav-enlace">Nosotros</a>
            <a href="index.html#experiencia" class="nav-enlace">Experiencia</a>
            <a href="reclamos.html" class="nav-enlace">Reclamos</a>
            <a href="hacerPedido.html" class="nav-enlace">Pedidos</a>
        </nav>


            <section class="containers">
                <form action="" class="formulario">
                    <h2 class="formulario_titulo">Has tu Pedido</h2>

                    <label for="nombre" class="formulario_label">Nombre:</label>
                    <input type="text" id="nombre" class="formulario_input" required>

                    <label for="apellido" class="formulario_label">Apellido:</label>
                    <input type="text" id="apellido" class="formulario_input" required>

                    <label for="tipo_doc" class="formulario_label">Tipo Documento:</label>
                    <select id="tipo_doc" class="formulario_input">
                        <option value="dni">DNI</option>
                        <option value="ce">Carnet de Extranjería</option>
                        <option value="pasaporte">Pasaporte</option>
                    </select>

                    <label for="num_doc" class="formulario_label">Número de documento:</label>
                    <input type="number" id="num_doc" class="formulario_input" required>


                    <label class="formulario_label">Elige tu burger</label>
                    <select required class="formulario_input">
                        <option value="">-- Selecciona --</option>
                        <option>Hamburguesa Clásica</option>
                        <option>Hamburguesa grande</option>
                        <option>Hamburguesa tejana</option>
                        <option>Doble con queso</option>
                        <option>Nuggets</option>
                    </select>

                    <label class="formulario_label">Extras</label>
                    <div class="formulario_input">
                        <label><input type="checkbox"> Queso extra</label>
                        <label><input type="checkbox"> Tocino</label>
                        <label><input type="checkbox"> Papas</label>
                        <label><input type="checkbox"> Bebida</label>
                    </div>

                    <label class="formulario_label">Cantidad</label>
                    <input type="number" min="1" value="1" class="formulario_input">

                    <label class="formulario_label">Pago</label>
                    <select class="formulario_input">
                        <option>Efectivo</option>
                        <option>Yape / Plin</option>
                        <option>Tarjeta</option>
                    </select>
                </form>
            </section>

            <footer class="pie">
                <p>📍 Lima - Perú | 📞 999 999 999</p>
            </footer>
        </main>
    </body>
</html>
