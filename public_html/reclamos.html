<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Reclamaciones - Lima, Perú</title>
    <link href="CSS/styles.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Adamina&family=Alex+Brush&family=Arbutus+Slab&family=Berkshire+Swash&display=swap"
        rel="stylesheet">
</head>
<body>
    <main class="PaginaRest">
        <header class="banner">
            <div class="banner-overlay"></div>
            <div class="banner-llamas"></div>
            <div class="banner-contenido">
                <img src="imagenes/Logo/LOGO.png" alt="El Buen Sabor" class="logo" />
                <p class="banner-slogan">Donde cada plato cuenta una historia</p>
            </div>
        </header>

        <nav>
            <a href="index.html#Nosotros" class="nav-enlace">
                <i class="fa-solid fa-users"></i> Nosotros  <!-- Agregamos icono de usuarios y asi con todos con (Font Awesome) -->
            </a>

            <a href="index.html#Productos" class="nav-enlace">
                <i class="fa-solid fa-utensils"></i> Productos
            </a>

            <a href="index.html#experiencia" class="nav-enlace">
                <i class="fa-solid fa-star"></i> Experiencia
            </a>
            <a href="reclamos.html" class="nav-enlace">
                <i class="fa-solid fa-comment-dots"></i> Reclamos
            </a>
        </nav>


        <section class="containers">
            <form action="" class="formulario">
                <h2 class="formulario_titulo">Hoja de Reclamaciones</h2>

                <label for="nombre" class="formulario_label">Nombre:</label>
                <input type="text" id="nombre" class="formulario_input" required>

                <label for="apellido" class="formulario_label">Apellido:</label>
                <input type="text" id="apellido" class="formulario_input" required>

                <label for="tipo_doc" class="formulario_label">Tipo Documento:</label>
                <select id="tipo_doc" class="formulario_input">
                    <option value="dni">DNI</option>
                    <option value="ce">Carnet de Extranjería</option>
                    <option value="pasaporte">Pasaporte</option>
                </select>

                <label for="num_doc" class="formulario_label">Número de documento:</label>
                <input type="number" id="num_doc" class="formulario_input" required>

                <label for="reclamo" class="formulario_label">Detalle del reclamo:</label>
                <textarea id="reclamo" class="formulario_area" rows="5"></textarea>

                <button type="submit" class="formulario_submit">Enviar Reclamo</button>
            </form>
        </section>

        <footer class="pie">
            <h5>Siguenos en</h5>
            <div class="cajas_red">
                <a href="https://www.instagram.com/" class="Redes_Sociales" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://www.facebook.com/" class="Redes_Sociales" target="_blank">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="https://www.whatsapp.com/?lang=es" class="Redes_Sociales" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
                <a href="https://www.tiktok.com/?lang=es" class="Redes_Sociales" target="_blank">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
            </div>
            <h6>📍 Lima - Perú | 📞 999 999 999</h6>
        </footer>
    </main>
</body>
</html>
