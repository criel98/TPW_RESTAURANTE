<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Reclamaciones - Lima, Perú</title>
    <link href="CSS/styles.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <main class="PaginaRest">
       <header class="banner">
            <img src="imagenes/Logo/LOGO.png" alt="" class="logo"/>
            <h3>Donde cada plato cuenta una historia</h3>
        </header>

        <nav>
            <a href="index.html" class="nav-enlace">← Regresar al inicio</a>
        </nav>

        <section class="containers">
            <form action="" class="formulario">
                <h2 class="formulario_titulo">Hoja de Reclamaciones</h2>

                <label for="nombre" class="formulario_label">Nombre:</label>
                <input type="text" id="nombre" class="formulario_input" required>

                <label for="apellido" class="formulario_label">Apellido:</label>
                <input type="text" id="apellido" class="formulario_input" required>

                <label for="tipo_doc" class="formulario_label">Tipo Documento:</label>
                <select id="tipo_doc" class="formulario_input">
                    <option value="dni">DNI</option>
                    <option value="ce">Carnet de Extranjería</option>
                    <option value="pasaporte">Pasaporte</option>
                </select>

                <label for="num_doc" class="formulario_label">Número de documento:</label>
                <input type="number" id="num_doc" class="formulario_input" required>

                <label for="reclamo" class="formulario_label">Detalle del reclamo:</label>
                <textarea id="reclamo" class="formulario_area" rows="5"></textarea>

                <button type="submit" class="formulario_submit">Enviar Reclamo</button>
            </form>
        </section>

        <footer class="pie">
            <p>📍 Lima - Perú | 📞 999 999 999</p>
        </footer>
    </main>
</body>
</html>
